<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REST TIMER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --accent-dim: #8aad00;
    --warn: #ff6b00;
    --text: #f0f0f0;
    --muted: #888;
    --ring-size: min(52vw, 260px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  header {
    width: 100%;
    padding: 24px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    line-height: 1;
  }

  .tagline {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── PRESETS ── */
  .presets {
    display: flex;
    gap: 10px;
    margin: 28px 0 0;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 0 20px;
  }

  .preset-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: #aaa;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .preset-btn:hover, .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,255,0,0.06);
  }

  /* ── RING ROW ── */
  .ring-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 28px 12px 0;
    width: 100%;
    max-width: 500px;
    z-index: 1;
    position: relative;
  }

  .side-btn {
    flex: 1;
    max-width: 72px;
    height: var(--ring-size);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: #ccc;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .side-btn:active {
    background: var(--border);
    transform: scale(0.96);
  }

  .side-btn span {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: #777;
    text-transform: uppercase;
  }

  /* ── RING ── */
  .ring-wrap {
    position: relative;
    width: var(--ring-size);
    height: var(--ring-size);
    flex-shrink: 0;
  }

  .ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: #2a2a2a;
    stroke-width: 6;
  }

  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
  }

  .ring-warn .ring-progress { stroke: var(--warn); }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4.5rem, 18vw, 7rem);
    line-height: 1;
    letter-spacing: 0.04em;
    color: var(--text);
    transition: color 0.3s;
  }

  .ring-warn .time-display { color: var(--warn); }

  .time-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: #aaa;
    text-transform: uppercase;
    margin-top: 4px;
  }



  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 14px;
    margin-top: 22px;
    z-index: 1;
    position: relative;
  }

  .btn-main {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    padding: 14px 48px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-main:hover { background: #d8ff30; }
  .btn-main:active { transform: scale(0.96); }

  .btn-reset {
    background: transparent;
    color: #aaa;
    border: 1.5px solid var(--border);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    padding: 14px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-reset:hover { border-color: #aaa; color: var(--text); }
  .btn-reset:active { transform: scale(0.96); }

  /* ── PULSE ANIM ── */
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(200,255,0,0.35); }
    70%  { box-shadow: 0 0 0 18px rgba(200,255,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(200,255,0,0); }
  }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.05s;
  }

  .flash-overlay.flash { animation: flash-anim 0.4s ease-out forwards; }

  @keyframes flash-anim {
    0%   { opacity: 0.18; }
    100% { opacity: 0; }
  }

  .time-display.done { color: var(--accent); }

  .round-counter {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: #aaa;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .round-counter span {
    color: var(--accent);
    font-size: 0.8rem;
  }

  /* warn label inside ring */
  .warn-label {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    color: var(--warn);
    text-transform: uppercase;
    margin-top: 3px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .ring-warn .warn-label { opacity: 1; }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<header>
  <div class="logo">REST</div>
  <div class="tagline">workout timer</div>
</header>

<!-- PRESETS -->
<div class="presets">
  <button class="preset-btn" onclick="setPreset(90, this)">1:30<br><span style="font-size:0.55rem;font-family:'DM Mono';letter-spacing:0.1em;color:inherit">CARDIO</span></button>
  <button class="preset-btn active" onclick="setPreset(120, this)">2:00<br><span style="font-size:0.55rem;font-family:'DM Mono';letter-spacing:0.1em;color:inherit">HYPERTROPHY</span></button>
  <button class="preset-btn" onclick="setPreset(180, this)">3:00<br><span style="font-size:0.55rem;font-family:'DM Mono';letter-spacing:0.1em;color:inherit">STRENGTH</span></button>
  <button class="preset-btn" onclick="setPreset(240, this)">4:00<br><span style="font-size:0.55rem;font-family:'DM Mono';letter-spacing:0.1em;color:inherit">HEAVY LIFT</span></button>
</div>

<!-- RING ROW -->
<div class="ring-row">
  <button class="side-btn" onclick="adjustTime(-30)">
    <span>−30s</span>
  </button>

  <div class="ring-wrap" id="ringWrap">
    <svg class="ring-svg" viewBox="0 0 120 120" id="ringSvg">
      <circle class="ring-bg" cx="60" cy="60" r="54"/>
      <circle class="ring-progress" cx="60" cy="60" r="54" id="ringProgress"
        stroke-dasharray="339.29"
        stroke-dashoffset="0"/>
    </svg>
    <div class="ring-center">
      <div class="time-display" id="timeDisplay">2:00</div>
      <div class="time-label">remaining</div>
      <div class="warn-label">15 sec remaining</div>
      <div class="round-counter">SET <span id="roundNum">1</span></div>
    </div>
  </div>

  <button class="side-btn" onclick="adjustTime(30)">
    <span>+30s</span>
  </button>
</div>

<!-- MAIN CONTROLS -->
<div class="controls">
  <button class="btn-main" id="mainBtn" onclick="toggleTimer()">START</button>
  <button class="btn-reset" onclick="resetTimer()">RESET</button>
</div>



<script>
// ── STATE ──
let totalSecs  = 120;
let remainSecs = 120;
let running    = false;
let interval   = null;
let rounds     = 1;
let wakeLock   = null;
let warnFired  = false;
const WARN_AT  = 15;
const CIRCUMF  = 339.29;

const ringSvg  = document.getElementById('ringSvg');
const prog     = document.getElementById('ringProgress');
const disp     = document.getElementById('timeDisplay');
const mainBtn  = document.getElementById('mainBtn');
const flashEl  = document.getElementById('flashOverlay');
const roundNum = document.getElementById('roundNum');


// ── AUDIO ──
const actx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, dur, type = 'square', vol = 0.5, delay = 0) {
  const osc  = actx.createOscillator();
  const gain = actx.createGain();
  osc.connect(gain);
  gain.connect(actx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, actx.currentTime + delay);
  gain.gain.setValueAtTime(0, actx.currentTime + delay);
  gain.gain.linearRampToValueAtTime(vol, actx.currentTime + delay + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + delay + dur);
  osc.start(actx.currentTime + delay);
  osc.stop(actx.currentTime + delay + dur + 0.05);
}

function playWarn() {
  beep(600, 0.12, 'triangle', 0.8, 0);
  beep(600, 0.12, 'triangle', 0.8, 0.2);
}

function playDone() {
  beep(600, 4.5, 'triangle', 0.8, 0);
}

function resumeAudio() {
  if (actx.state === 'suspended') actx.resume();
}

// ── DISPLAY ──
function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function updateDisplay() {
  disp.textContent = fmt(remainSecs);
  const pct = remainSecs / totalSecs;
  prog.style.strokeDashoffset = CIRCUMF * (1 - pct);
  const isWarn = remainSecs <= WARN_AT && remainSecs > 0;
  ringSvg.classList.toggle('ring-warn', isWarn);
  disp.classList.toggle('done', remainSecs === 0);
}

// ── PRESETS ──
function setPreset(secs, btn) {
  if (running) return;
  totalSecs  = secs;
  remainSecs = secs;
  warnFired  = false;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateDisplay();
}

// ── ADJUST ──
function adjustTime(delta) {
  resumeAudio();
  const newVal = Math.max(10, remainSecs + delta);
  if (!running) totalSecs = newVal;
  remainSecs = newVal;
  if (remainSecs > totalSecs) totalSecs = remainSecs;
  warnFired = remainSecs <= WARN_AT;
  updateDisplay();
}

// ── TIMER ──
function toggleTimer() {
  resumeAudio();
  running ? pause() : start();
}

function start() {
  if (remainSecs <= 0) resetTimer();
  running = true;
  mainBtn.textContent = 'PAUSE';
  acquireWakeLock();
  interval = setInterval(tick, 1000);
}

function pause() {
  running = false;
  mainBtn.textContent = 'RESUME';
  clearInterval(interval);
  releaseWakeLock();
}

function resetTimer() {
  clearInterval(interval);
  running    = false;
  remainSecs = totalSecs;
  warnFired  = false;
  mainBtn.textContent = 'START';
  disp.classList.remove('done');
  ringSvg.classList.remove('ring-warn');
  updateDisplay();
  releaseWakeLock();
}

function tick() {
  if (remainSecs <= 0) { onDone(); return; }
  remainSecs--;
  if (remainSecs === WARN_AT && !warnFired) {
    warnFired = true;
    playWarn();
  }
  remainSecs === 0 ? onDone() : updateDisplay();
}

function onDone() {
  clearInterval(interval);
  running    = false;
  remainSecs = 0;
  updateDisplay();
  playDone();
  vibrate([200, 100, 200, 100, 400]);
  flashScreen();
  rounds++;
  roundNum.textContent = rounds;
  mainBtn.textContent = 'PAUSE';
  setTimeout(() => {
    remainSecs = totalSecs;
    warnFired  = false;
    updateDisplay();
    start();
  }, 2400);
}

function flashScreen() {
  flashEl.classList.remove('flash');
  void flashEl.offsetWidth;
  flashEl.classList.add('flash');
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ── WAKE LOCK ──
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
      } catch(e) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && running) acquireWakeLock();
});

// Preload voices
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); toggleTimer(); }
  if (e.code === 'KeyR') resetTimer();
});

updateDisplay();
</script>
</body>
</html>
